name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback so a failed publish (e.g. a transient PyPI 5xx) can
  # be retried without re-tagging.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        # Install all PyPI-resolvable extras so ty can resolve imports from
        # extras-guarded modules without failing (F011 compliance). Excludes
        # mcp and transformers — those siblings are not yet on PyPI.
        run: |
          uv sync --group dev \
            --extra markdown --extra html --extra images --extra layout \
            --extra polars --extra duckdb --extra dedup-perceptual --extra nlp \
            --python 3.13

      - name: Verify version matches tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(uv run python -c "from kaos_content._version import __version__; print(__version__)")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match _version.py value '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pre-publish QA
        run: |
          uv run ruff format --check kaos_content/ tests/
          uv run ruff check kaos_content/ tests/
          uv run ty check kaos_content/ tests/
          uv run pytest tests/ -m "not integration and not fuzz" --no-cov

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_content-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_content
          assert kaos_content.__version__, 'version missing from wheel'
          from kaos_content import (
              Block,
              BlockQuote,
              BulletList,
              ContentDocument,
              DocumentBuilder,
              DocumentView,
              Inline,
              Paragraph,
              Table,
          )
          # Build a minimal document.
          builder = DocumentBuilder()
          builder.paragraph('Hello, world.')
          doc = builder.build()
          assert isinstance(doc, ContentDocument)
          print(f'kaos-content {kaos_content.__version__}: smoke OK')
          "

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kaos-content
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: false

  github-release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *a* || "$VERSION" == *b* || "$VERSION" == *rc* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "kaos-content $VERSION" \
            --notes-from-tag \
            $PRERELEASE_FLAG \
            dist/*
