name: build

# Standard `build` lane (per
# kaos-modules/docs/oss/40-ci-cd/runner-cost-reduction-plan.md):
# build wheel/sdist, `twine check --strict`, clean-venv smoke install.
# Linux Python 3.13 on PR / main push / tag. The release workflow
# (release.yml) is the gated artifact-publish path; this lane is the
# PR-time smoke that the artifact builds cleanly and the wheel
# installs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel and sdist
        run: uv build

      - name: Verify metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_content-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_content
          assert kaos_content.__version__, 'version missing from wheel'
          from kaos_content import (
              Block,
              BlockQuote,
              BulletList,
              ContentDocument,
              DocumentBuilder,
              DocumentView,
              Inline,
              Paragraph,
              Table,
          )
          # Build a minimal document.
          builder = DocumentBuilder()
          builder.paragraph('Hello, world.')
          doc = builder.build()
          assert isinstance(doc, ContentDocument)
          print(f'kaos-content {kaos_content.__version__}: public API OK')
          "

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
