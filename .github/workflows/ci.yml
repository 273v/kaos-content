name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── lint ──────────────
  # Separate from tests so format / lint / type failures fail-fast and
  # are easy to spot without combing through test output.
  lint:
    name: Lint
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        # Install all PyPI-resolvable extras so ty can resolve imports from
        # extras-guarded modules without failing (F011 compliance). Excludes
        # mcp and transformers — those siblings are not yet on PyPI.
        run: |
          uv sync --group dev \
            --extra markdown --extra html --extra images --extra layout \
            --extra polars --extra duckdb --extra dedup-perceptual --extra nlp \
            --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check kaos_content/ tests/

      - name: Ruff lint
        run: uv run ruff check kaos_content/ tests/

      - name: Type check (ty)
        run: uv run ty check kaos_content/ tests/

  # ────────────── pre-commit ──────────────
  # Catches any drift between the local pre-commit config and the
  # checks above. If a contributor disabled their local hooks, this
  # job still enforces the contract on the PR.
  pre-commit:
    name: Pre-commit hooks
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (needed by the local ty hook)
        run: |
          uv sync --group dev \
            --extra markdown --extra html --extra images --extra layout \
            --extra polars --extra duckdb --extra dedup-perceptual --extra nlp \
            --python 3.13

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ────────────── test ──────────────
  test:
    name: Test (${{ matrix.display-os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Stable Python minors install in <2 min from cached wheels;
    # 25 min is generous headroom for source-built wheels on the
    # 3.14t free-threaded matrix entry. Without an explicit timeout,
    # GHA waits the default 6 hours on a stuck Install step.
    timeout-minutes: 25
    # Linux x64 (self-hosted) keeps the 3-Python-version matrix for
    # fast PR feedback. macOS-arm64 + Windows-x64 each get a single
    # Python 3.13 leg, gated experimental until proven stable.
    # Mirrors the cross-OS pattern landed in the kaos-* family
    # (kaos-core E1, kaos-graph E3, kaos-nlp-core E2, kaos-ml-core,
    # kaos-nlp-transformers E4).
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x64 (self-hosted) — full Python matrix ──
          - python-version: "3.13"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          - python-version: "3.14"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          # Pre-release of 3.15 (expected GA October 2026).
          - python-version: "3.15"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # NOTE: 3.14t (free-threaded / PEP 703) is intentionally
          # NOT in the matrix at v0.1.0a*. Pillow / numpy / polars /
          # duckdb / lxml don't yet ship Py_GIL_DISABLED wheels for
          # 3.14t. Re-add once the ecosystem ships free-threaded
          # wheels for our extras (likely late-2026 timeframe).
          # ── macOS arm64 — single Python smoke ──
          - python-version: "3.13"
            os: macos-14
            display-os: macos-arm64
            experimental: true
          # ── Windows x64 — single Python smoke ──
          - python-version: "3.13"
            os: windows-latest
            display-os: windows-x64
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    env:
      # PEP 540 UTF-8 Mode + stdout encoding override. Windows cp1252
      # default codepage crashes on Unicode stdout / file opens
      # without explicit encoding=. No-op on Linux/macOS. Lessons from
      # the kaos-* family cross-OS rollout.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          # Per-leg cache key so cross-OS legs don't race.
          cache-suffix: test-${{ matrix.display-os }}-py${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        # `--preview` lets `uv python install` resolve in-development
        # interpreters (3.15) and the free-threaded variant (3.14t).
        # No-op for stable versions.
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install system libraries for source-built C extensions
        # Linux-only: macOS / Windows runners don't have apt-get; the
        # source-build paths for Pillow / lxml only kick in on Linux
        # 3.15 anyway (3.13/3.14 hit cached wheels; macOS+Windows hit
        # cached wheels for 3.13 too).
        if: runner.os == 'Linux'
        # Several PyPI deps don't ship pre-built wheels for newer Python
        # minors during their pre-release window; uv falls back to
        # source-build, which needs the corresponding C headers.
        #
        # lxml ([html] extra):
        #   libxml2-dev, libxslt-dev
        #
        # Pillow ([images] extra) — full set per
        # https://pillow.readthedocs.io/en/latest/installation/building-from-source.html#external-libraries:
        #   libjpeg-dev, zlib1g-dev    (REQUIRED — Pillow refuses to build
        #                               without these by default)
        #   libtiff-dev                (TIFF compression)
        #   libfreetype6-dev           (font / type services)
        #   liblcms2-dev               (color management)
        #   libwebp-dev                (WebP)
        #   libopenjp2-7-dev           (JPEG 2000)
        #   libimagequant-dev          (color quantization for PNG palette)
        #
        # Skipped: libraqm (complex-text layout, niche), libxcb (X11
        # screengrab, headless CI can't use it), libavif (vendored
        # build per Pillow docs).
        #
        # Cheap (~15s) and a no-op when wheels do exist for the matrix
        # interpreter (3.13 / 3.14 stable lanes hit cached wheels and
        # never run the source-build path).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev libxslt-dev \
            libjpeg-dev zlib1g-dev libtiff-dev libfreetype6-dev \
            liblcms2-dev libwebp-dev libopenjp2-7-dev libimagequant-dev

      - name: Install dependencies
        run: |
          uv sync --group dev \
            --extra markdown --extra html --extra images --extra layout \
            --extra polars --extra duckdb --extra dedup-perceptual --extra nlp \
            --python ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        # `shell: bash` so the multi-line `\` continuations parse on
        # Windows runners (default PowerShell reads `\` as a unary
        # operator). Git Bash is preinstalled on `windows-latest`.
        shell: bash
        run: |
          uv run pytest tests/ \
            -m "not integration and not fuzz" \
            --cov=kaos_content \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.display-os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ────────────── min-deps ──────────────
  # Resolve and test against the minimum declared versions of every
  # dependency so we catch "we said >=X but actually need X+1" drift.
  # Runs on 3.13 only; 3.14 is the cutting edge and may not have wheels
  # for very old dep versions.
  min-deps:
    name: Test against minimum dependencies
    runs-on: kaos-x64-16core
    # `--resolution=lowest-direct` exercises the dependency floors.
    # If a floor pins a release that pre-dates current-Python wheels,
    # uv falls back to source-build and Install can balloon — the
    # 20 min cap surfaces that as a hard fail rather than a
    # multi-hour stall (which is what the 2026-05-07 run did before
    # we tightened the numpy / polars / duckdb floors).
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            -m "not integration and not fuzz" \
            --no-cov \
            -q

  # ────────────── build + wheel smoke test ──────────────
  build:
    name: Build distribution + smoke test
    runs-on: kaos-x64-16core
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_content-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_content
          assert kaos_content.__version__, 'version missing from wheel'
          from kaos_content import (
              Block,
              BlockQuote,
              BulletList,
              ContentDocument,
              DocumentBuilder,
              DocumentView,
              Inline,
              Paragraph,
              Table,
          )
          # Build a minimal document.
          builder = DocumentBuilder()
          builder.paragraph('Hello, world.')
          doc = builder.build()
          assert isinstance(doc, ContentDocument)
          print(f'kaos-content {kaos_content.__version__}: public API OK')
          "

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
